name: 재배대 현황 자동 갱신

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: 레포 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: pip install gspread google-auth openpyxl

      - name: 서비스 계정 키 생성
        run: echo '${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}' > service-account-key.json

      - name: 재배대 현황 추출
        run: python fetch_cultivation.py
        env:
          GOOGLE_SERVICE_ACCOUNT_KEY: service-account-key.json

      - name: 키 파일 삭제
        run: rm -f service-account-key.json

      - name: 결과 검증 (빈 파일이면 실패 처리)
        run: |
          python3 - <<'EOF'
          import json, sys
          with open("bed_status.json") as f:
              data = json.load(f)
          if not data:
              print("❌ bed_status.json이 비어있습니다. 커밋하지 않습니다.")
              sys.exit(1)
          print(f"✅ {len(data)}개 재배대 데이터 확인 완료")
          EOF

      - name: 변경사항 커밋 & 푸시
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bed_status.json
          git diff --staged --quiet || git commit -m "🌱 재배대 현황 자동 갱신 $(date +'%Y-%m-%d %H:%M KST')"
          git push
          
